name: Android APK Uretici

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Buildozer ile APK Uret
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug

      - name: APK'yi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Bilgi_Labirenti_APK
          path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/bilgilabirenti/bin/*.apk
